name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gitleaks
        id: gitleaks-cache
        uses: actions/cache@v4
        with:
          path: ~/bin/gitleaks
          key: gitleaks-8.21.2

      - name: Install Gitleaks
        if: steps.gitleaks-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          mv gitleaks ~/bin/

      - name: Run Gitleaks
        run: ~/bin/gitleaks detect --source . --verbose

      - name: Check for committed .env files
        run: |
          if git ls-files --cached | grep -E '^\.env$|^\.env\.local$|^\.env\.production$'; then
            echo "::error::.env file is tracked by git! Remove it with: git rm --cached .env"
            exit 1
          fi
          echo "No .env files tracked."

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          GOOGLE_API_KEY: "test-key"
          PHOENIX_API_KEY: "test-key"
        run: python -m pytest tests/ -v --tb=short

      - name: Lint with ruff
        working-directory: backend
        run: ruff check src/ --select E,F,I --ignore E501

      - name: Check imports and syntax
        working-directory: backend
        run: find src/ -name "*.py" -exec python -m py_compile {} +

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  pr-description:
    name: PR Description Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check PR description is not empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY_LEN=$(printf '%s' "$PR_BODY" | wc -c | tr -d ' ')
          if [ -z "$PR_BODY" ] || [ "$BODY_LEN" -lt 20 ]; then
            echo "::error::PR description is missing or too short. Fill out the PR template."
            exit 1
          fi
          echo "PR description looks good."

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [secret-scan, backend-checks, frontend-checks]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          build-args: NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
