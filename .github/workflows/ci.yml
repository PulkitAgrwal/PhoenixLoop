name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Project-wide deploy targets. Cloud Run service URLs are deterministic
# from project number + service name + region, so hardcoding the backend
# URL here is safe and lets the frontend bake it at build time without
# needing a job-to-job artifact handoff. PHOENIX_BASE_URL is intentionally
# scoped to deploy-frontend only — placing it at workflow level would
# bleed into backend-tests where pydantic-settings reads it from
# os.environ even when ``_env_file=None`` is passed.
env:
  GCP_PROJECT: phoenixloop
  GCP_REGION: us-central1
  AR_REPO: phoenixloop
  BACKEND_SERVICE: phoenixloop-backend
  FRONTEND_SERVICE: phoenixloop-frontend
  BACKEND_URL: https://phoenixloop-backend-856079316421.us-central1.run.app
  RUNTIME_SA: phoenixloop-runtime@phoenixloop.iam.gserviceaccount.com

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Validation jobs — run on every push and PR, fully parallel
  # ────────────────────────────────────────────────────────────────────

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gitleaks
        id: gitleaks-cache
        uses: actions/cache@v4
        with:
          path: ~/bin/gitleaks
          key: gitleaks-8.21.2

      - name: Install Gitleaks
        if: steps.gitleaks-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          mv gitleaks ~/bin/

      - name: Run Gitleaks
        run: ~/bin/gitleaks detect --source . --verbose

      - name: Check no .env files tracked
        run: |
          if git ls-files --cached | grep -E '^\.env$|^\.env\.local$|^\.env\.production$'; then
            echo "::error::.env file is tracked by git! Remove it with: git rm --cached .env"
            exit 1
          fi

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest
        working-directory: backend
        env:
          GOOGLE_API_KEY: test-key
          PHOENIX_API_KEY: test-key
        run: python -m pytest tests/ -q --tb=short

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # Install just ruff for lint; full deps unneeded here. Pinned to
      # match the version in backend/requirements.txt.
      - name: Install ruff
        run: pip install "ruff>=0.13.0"

      - name: ruff check
        working-directory: backend
        run: ruff check src/ --select E,F,I --ignore E501

      - name: py_compile
        working-directory: backend
        run: find src/ -name "*.py" -exec python -m py_compile {} +

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: tsc --noEmit
        working-directory: frontend
        run: npx tsc --noEmit

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Next.js incremental build cache — keyed on package-lock so node_modules
      # alignment invalidates it; restore-keys fall back to the lockfile-only
      # entry so source changes still get an incremental rebuild.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build (verification only)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  pr-description:
    name: PR Description Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description is not empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY_LEN=$(printf '%s' "$PR_BODY" | wc -c | tr -d ' ')
          if [ -z "$PR_BODY" ] || [ "$BODY_LEN" -lt 20 ]; then
            echo "::error::PR description is missing or too short."
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────
  # Verification-only Docker build for PRs (no push, no deploy).
  # On push-to-main, the deploy jobs do the real build+push instead.
  # ────────────────────────────────────────────────────────────────────

  docker-build-pr:
    name: Docker Build (PR verification)
    runs-on: ubuntu-latest
    needs: [secret-scan, backend-tests, backend-lint, frontend-lint, frontend-typecheck, frontend-build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Backend image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Frontend image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ────────────────────────────────────────────────────────────────────
  # Deploy — only on push to main, only after all checks pass.
  # Uses Workload Identity Federation (no SA keys in GitHub secrets).
  # Backend and frontend deploy in parallel; the frontend bakes the
  # already-known backend URL at build time.
  # ────────────────────────────────────────────────────────────────────

  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    needs: [secret-scan, backend-tests, backend-lint, frontend-lint, frontend-typecheck, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write  # required to mint the WIF OIDC token
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/backend:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Deploy revision
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/backend:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --quiet

      - name: Smoke test /api/health
        run: |
          for i in {1..10}; do
            if curl -sf "${{ env.BACKEND_URL }}/api/health" >/dev/null; then
              echo "Backend healthy."
              exit 0
            fi
            sleep 3
          done
          echo "::error::Backend never became healthy after deploy"
          exit 1

  deploy-frontend:
    name: Deploy Frontend (Cloud Run)
    runs-on: ubuntu-latest
    needs: [secret-scan, backend-tests, backend-lint, frontend-lint, frontend-typecheck, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PHOENIX_BASE_URL: https://app.phoenix.arize.com/s/kunalpatra18
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_PHOENIX_URL=${{ env.PHOENIX_BASE_URL }}
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Deploy revision
        # --service-account is required: without it Cloud Run defaults
        # to the project's Compute Engine SA, and the deploy SA needs
        # iam.serviceAccountUser on whatever SA the service runs as.
        # We grant that on phoenixloop-runtime (self-impersonation) but
        # not on the default Compute SA — so reuse the runtime SA here.
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/frontend:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --service-account=${{ env.RUNTIME_SA }} \
            --quiet
