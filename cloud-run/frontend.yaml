apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: phoenixloop-frontend
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/phoenixloop-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://phoenixloop-backend-PROJECT_HASH-uc.a.run.app
            - name: NEXT_PUBLIC_PHOENIX_URL
              value: https://app.phoenix.arize.com
