# cloudbuild.yaml — builds both backend and frontend containers and
# deploys them to Cloud Run. Run with:
#   gcloud builds submit --config cloudbuild.yaml
steps:
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/phoenixloop-backend:$SHORT_SHA
      - ./backend

  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/phoenixloop-frontend:$SHORT_SHA
      - ./frontend

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/phoenixloop-backend:$SHORT_SHA]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/phoenixloop-frontend:$SHORT_SHA]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - phoenixloop-backend
      - --image=gcr.io/$PROJECT_ID/phoenixloop-backend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - phoenixloop-frontend
      - --image=gcr.io/$PROJECT_ID/phoenixloop-frontend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/phoenixloop-backend:$SHORT_SHA
  - gcr.io/$PROJECT_ID/phoenixloop-frontend:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
