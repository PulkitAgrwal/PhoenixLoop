services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/db/phoenixloop.db
      - SKIP_AUTOSEED=${SKIP_AUTOSEED:-false}
    volumes:
      - db-data:/app/db
      - ./data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_PHOENIX_URL: ${NEXT_PUBLIC_PHOENIX_URL:-https://app.phoenix.arize.com}
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
