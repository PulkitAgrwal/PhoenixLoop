services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/db/phoenixloop.db
      - SKIP_AUTOSEED=${SKIP_AUTOSEED:-false}
    volumes:
      - db-data:/app/db
      - ./data:/data:ro
      # Fixture data for LIGHTWEIGHT_DEMO=true autoseed. Tests/ isn't in the
      # image but the seed loader resolves fixtures relative to backend/src
      # → ../../tests/fixtures/seed/. Mounting tests in read-only keeps prod
      # images slim while still enabling fixture mode for demos/tests.
      - ./backend/tests:/app/tests:ro
      # Application Default Credentials for Vertex AI. Read-only.
      # Only used when GOOGLE_GENAI_USE_VERTEXAI=true; otherwise ignored.
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_PHOENIX_URL: ${NEXT_PUBLIC_PHOENIX_URL:-https://app.phoenix.arize.com}
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
